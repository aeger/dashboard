name: az-lab-dashboard

# Dashboard-only stack. uptime-kuma and immich were extracted to their own
# stacks (azlab/services/uptime-kuma, azlab/services/immich) — completing the
# 2026-04-30 extraction — so a dashboard down/redeploy no longer takes them
# (incl. the immich photo DB) down with it. They remain reachable as siblings
# on the shared external `proxy` network.

services:
  # ─── Dashboard (Next.js) ─────────────────────────────────────────────────────
  dashboard:
    image: az-dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: az-dashboard
    restart: unless-stopped
    # Run as the container's userns-root, which (rootless podman uid_map 0→1000)
    # maps to host `almty1` — the identity the web terminal / container-update
    # feature SSHes as. Without this the app runs as uid 1001 and cannot read the
    # 0640 almty1-owned terminal SSH key mounted at /run/secrets/terminal_ssh_key
    # ("Cannot read SSH key"). Keeps the key at 0640 (not world-readable).
    user: "0:0"
    # Upstream resolvers for aardvark-dns. Without these the container rode the
    # full aardvark → systemd-resolved → AdGuard chain, whose occasional blips
    # surfaced as intermittent EAI_AGAIN on external API calls (calendar/weather,
    # ~21/day). AdGuard (split-DNS, internal + external) primary, public fallback
    # so a momentary AdGuard hiccup can't stall external lookups. aardvark still
    # resolves sibling container names (immich-server, uptime-kuma, etc.).
    dns:
      - 192.168.99.2
      - 1.1.1.1
      - 1.0.0.1
    environment:
      - IMMICH_URL=${IMMICH_URL:-http://immich-server:2283}
      - IMMICH_API_KEY=${IMMICH_API_KEY:-}
      - UPTIME_KUMA_URL=${UPTIME_KUMA_URL:-http://uptime-kuma:3001}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-}
      - ADGUARD_URL=${ADGUARD_URL:-}
      - ADGUARD_USERNAME=${ADGUARD_USERNAME:-}
      - ADGUARD_PASSWORD=${ADGUARD_PASSWORD:-}
      - PORTAINER_URL=${PORTAINER_URL:-http://portainer:9000}
      - PORTAINER_API_KEY=${PORTAINER_API_KEY:-}
      - GOOGLE_CALENDAR_ICAL_URL=${GOOGLE_CALENDAR_ICAL_URL:-}
      - GOOGLE_SERVICE_ACCOUNT_KEY=${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      - GOOGLE_CALENDAR_IDS=${GOOGLE_CALENDAR_IDS:-}
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:-}
      - RUSTDESK_HOST=${RUSTDESK_HOST:-}
      - RUSTDESK_KEY=${RUSTDESK_KEY:-}
      - HA_URL=${HA_URL:-}
      - HA_ACCESS_TOKEN=${HA_ACCESS_TOKEN:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SENTINEL_API_URL=${SENTINEL_API_URL:-http://sentinel-api:3200}
      - SENTINEL_API_KEY=${SENTINEL_API_KEY:-}
      - TRAEFIK_DYNAMIC_DIR=/traefik-dynamic
      - TERMINAL_SSH_KEY=/run/secrets/terminal_ssh_key
      - TERMINAL_SSH_HOST=192.168.1.181
      - TERMINAL_SSH_USER=almty1
      # Phase 2: Claude programmatic-spend log (written by ~/claude/lib/claude_call.py)
      - CLAUDE_SPEND_LOG=/app/spend/usage.jsonl
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:rw
      - /home/almty1/.dashboard-terminal-key:/run/secrets/terminal_ssh_key:ro
      - /home/almty1/azlab/infrastructure/traefik/dynamic:/traefik-dynamic:rw
      - /home/almty1/azlab/services/rustdesk/data:/app/rustdesk-data:ro
      - /home/almty1/.local/state/claude-spend:/app/spend:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`home.az-lab.dev`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      # TODO: Re-evaluate Authelia SSO for external access (photos, portainer, etc.)
      - "traefik.http.routers.dashboard.middlewares=lan-allow@file"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
